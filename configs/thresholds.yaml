# Timing and confidence thresholds.
#
# Units are carried in the suffix (_ms, _hz, _min). Values mirror the
# defaults baked into the Python modules so swapping the file against
# code does not produce silent divergence; state-machine.md is the
# authoritative source when they disagree.

presence:
  face_lost_timeout_ms: 800          # recent_face_loss window
  away_timeout_ms: 10000             # Idle/Sleepy -> Away (no_face_long_timeout) (default: 60000)
  welcome_min_away_ms: 3000          # just_reappeared gate for welcome oneshot
  face_moved_sample_hz: 10           # vision.face.moved publish rate

behavior:
  idle_to_sleepy_timeout_ms: 120000  # Idle/Engaged -> Sleepy (long_idle) 
  engaged_to_idle_timeout_ms: 15000  # no_interaction_for_a_while
  engagement_window_ms: 5000         # recent interaction → confirmed_user_and_interacting
  intent_cooldown_ms: 1500           # duplicate intent suppression
  startled_oneshot_min_ms: 600       # startled minimum display duration
  listening_timeout_ms: 5000         # Listening -> Idle when no intent
  alerting_auto_timeout_ms: 30000    # Alerting -> Idle without ack

vision:
  face_confidence_min: 0.6
  gesture_confidence_min: 0.75
  head_direction_confidence_min: 0.7

voice:
  stt_confidence_min: 0.5            # below → voice.intent.unknown
  intent_match_confidence_min: 0.6

task:
  http_timeout_ms: 3000              # home_client + weather
  http_retry_count: 1
