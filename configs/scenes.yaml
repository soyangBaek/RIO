# Scene-level presentation mapping
# 씬별 asset/mood/duration 매핑, oneshot priority/duration, Executing(kind) UI/사운드

scenes:
  startled_then_track:
    expression: "startled"
    sound: "startled"
    duration_ms: 600
    mood: "startled"

  welcome_back:
    expression: "welcome"
    sound: "welcome"
    animation: "welcome_wave"
    duration_ms: 1500
    mood: "welcome"

  sleep_mode_loop:
    expression: "sleepy"
    sound: "snore"
    animation: "dream"
    looping: true
    mood: "sleepy"

  take_photo_countdown:
    expression: "attentive"
    sound: "shutter"
    overlay: "camera"
    countdown_seconds: 3
    mood: "attentive"

  smarthome_feedback:
    expression: "happy"
    sound: "success"
    duration_ms: 1000
    mood: "happy"

  petting_reaction:
    expression: "happy"
    sound: "happy"
    duration_ms: 1000
    mood: "happy"

  alert_timer:
    expression: "alert"
    sound: "alert"
    overlay: "alert"
    looping: true
    mood: "alert"

  confused_reaction:
    expression: "confused"
    sound: "failure"
    duration_ms: 800
    mood: "confused"

  dance_mode:
    expression: "happy"
    animation: "dance"
    looping: true
    mood: "happy"

  calm_face:
    expression: "neutral"
    mood: "calm"

  attentive_face:
    expression: "attentive"
    mood: "attentive"

  inactive_dim:
    expression: "inactive"
    mood: "inactive"
    dim: true

  listening:
    expression: "attentive"
    overlay: "listening"
    mood: "attentive"

  game_mode:
    expression: "happy"
    overlay: "game"
    looping: true
    mood: "happy"

# Executing(kind) 별 연출 매핑
executing_kinds:
  photo:
    scene: "take_photo_countdown"
    ui: "CameraUI"
  game:
    scene: "game_mode"
    ui: "GameUI"
  dance:
    scene: "dance_mode"
    ui: "NormalFace"
  weather:
    scene: "attentive_face"
    ui: "NormalFace"
  smarthome:
    scene: "attentive_face"
    ui: "NormalFace"
  timer_setup:
    scene: "attentive_face"
    ui: "NormalFace"

# Oneshot priority/duration 기본값 (thresholds.yaml 의 oneshots 섹션과 동일)
oneshot_defaults:
  startled:
    priority: 30
    duration_ms: 600
  confused:
    priority: 25
    duration_ms: 800
  welcome:
    priority: 20
    duration_ms: 1500
  happy:
    priority: 20
    duration_ms: 1000

