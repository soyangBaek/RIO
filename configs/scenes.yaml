# Scene presentation mapping.
#
# ``oneshots`` configures priority / duration for the four oneshot events
# defined in state-machine.md §5. ``scenes`` maps a scene name (see
# ``app.scenes.catalog``) to its asset slots and timing. Durations are in
# milliseconds. Asset names resolve through ``assets/<category>/<name>.{png,wav}``
# with a fallback to ``assets/_dummy/`` and finally to programmatic
# primitives (``fallback_primitives``).

oneshots:
  startled:  {priority: 30, duration_ms: 600}
  confused:  {priority: 25, duration_ms: 800}
  welcome:   {priority: 20, duration_ms: 1500}
  happy:     {priority: 20, duration_ms: 1000}

executing_feedback:
  photo:        {ui: camera_ui,   sfx: shutter}
  weather:      {ui: normal_face, sfx: success}
  smarthome:    {ui: normal_face, sfx: success}
  timer_setup:  {ui: normal_face, sfx: success}
  game:         {ui: game_ui,     sfx: null}
  dance:        {ui: normal_face, sfx: null, animation: dance}

scenes:
  startled_then_track:
    mood: surprised
    sfx: startle
    duration_ms: 600

  welcome_back:
    mood: happy
    animation: welcome_wave
    duration_ms: 1500

  sleep_mode_loop:
    mood: sleepy
    animation: dream
    sfx: snore
    duration_ms: 3000

  take_photo_countdown:
    mood: attentive
    duration_ms: 3000

  smarthome_feedback_success:
    mood: happy
    sfx: success
    duration_ms: 1000

  smarthome_feedback_failure:
    mood: confused
    sfx: fail
    duration_ms: 1000

  petting_reaction:
    mood: happy
    sfx: satisfaction
    duration_ms: 1000

  dance_sequence:
    mood: happy
    animation: dance
    duration_ms: 3000
